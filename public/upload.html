<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentX RAG — Upload</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-brand"><span>AgentX</span> RAG</div>
    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="documents.html">Documents</a></li>
      <li><a href="search.html">Search</a></li>
      <li><a href="upload.html" class="active">Upload</a></li>
      <li><a href="maintenance.html">Maintenance</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Ingest Document</h1>

    <div class="card">
      <!-- Tab toggle -->
      <div class="tab-toggle">
        <button class="tab-btn active" data-tab="paste">Paste Text</button>
        <button class="tab-btn" data-tab="file">Upload File</button>
      </div>

      <!-- Mode 1: Paste Text -->
      <div id="tab-paste" class="tab-panel active">
        <textarea id="paste-text" class="input-field upload-textarea"
          placeholder="Paste document text here..." rows="10"></textarea>
        <div class="char-count"><span id="char-count">0</span> characters</div>
      </div>

      <!-- Mode 2: Upload File -->
      <div id="tab-file" class="tab-panel" style="display:none;">
        <div id="drop-zone" class="drop-zone">
          <p>Drag & drop a file here, or click to select</p>
          <input type="file" id="file-input" accept=".txt,.md,.json,.csv" style="display:none;">
        </div>
        <div id="file-info" class="file-info" style="display:none;">
          <span id="file-name"></span>
          <span class="sep">&middot;</span>
          <span id="file-size"></span>
        </div>
        <div id="file-warning" class="file-warning" style="display:none;"></div>
      </div>

      <!-- Metadata fields -->
      <div class="form-section">
        <div class="form-row">
          <div class="control-group">
            <label for="meta-source">Source</label>
            <input id="meta-source" class="input-field" type="text" placeholder="e.g., docs, manual, api">
          </div>
          <div class="control-group">
            <label for="meta-tags">Tags</label>
            <input id="meta-tags" class="input-field" type="text" placeholder="comma-separated, e.g., docs, v2, internal">
          </div>
          <div class="control-group">
            <label for="meta-docid">Document ID <span class="hint">(optional)</span></label>
            <input id="meta-docid" class="input-field" type="text" placeholder="auto-generated if empty">
          </div>
        </div>
      </div>

      <!-- Advanced options (collapsible) -->
      <div class="collapsible">
        <button class="collapsible-toggle" id="advanced-toggle">Advanced Options</button>
        <div class="collapsible-body" id="advanced-body" style="display:none;">
          <div class="form-row">
            <div class="control-group">
              <label for="chunk-size">Chunk Size</label>
              <input id="chunk-size" class="input-field input-sm" type="number" value="500" min="100" max="5000">
            </div>
            <div class="control-group">
              <label for="chunk-overlap">Chunk Overlap</label>
              <input id="chunk-overlap" class="input-field input-sm" type="number" value="50" min="0" max="500">
            </div>
          </div>
        </div>
      </div>

      <!-- Ingest button -->
      <div class="ingest-actions">
        <button id="btn-ingest" class="btn btn-primary btn-lg">Ingest</button>
        <span id="spinner" class="spinner" style="display:none;"></span>
      </div>

      <!-- Result area -->
      <div id="result-area" style="display:none;"></div>
    </div>

    <!-- Recent ingestion history -->
    <div class="card" style="margin-top:24px;">
      <div class="card-title">
        Recent Ingestions
        <button id="btn-clear-history" class="btn btn-secondary btn-sm" style="margin-left:auto;">Clear History</button>
      </div>
      <table class="data-table" id="history-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Source</th>
            <th>Document ID</th>
            <th class="center">Chunks</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
      <div id="history-empty" class="empty-state" style="display:none;">No ingestion history yet.</div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/upload.js"></script>
</body>
</html>
